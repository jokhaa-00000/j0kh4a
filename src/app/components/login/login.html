<div class="login-container">
  <div class="login-box">
    <h1>{{ 'header.login' | translate }}</h1>
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="phoneNumber">{{ 'register.phone' | translate }}</label>
        <input
          type="tel"
          id="phoneNumber"
          [(ngModel)]="phoneNumber"
          name="phoneNumber"
          [placeholder]="'register.phone' | translate"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'register.password' | translate }}</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          [placeholder]="'register.password' | translate"
          required
        />
      </div>

      <div *ngIf="errorMessage" class="alert alert-error">
        {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="alert alert-success">
        {{ successMessage }}
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? ('login.logging_in' | translate) : ('header.login' | translate) }}
      </button>

      <div class="register-link">
        <p>
          {{ 'login.no_account' | translate }}
          <a routerLink="/register">{{ 'login.create_here' | translate }}</a>
        </p>
      </div>
    </form>
  </div>
</div>
